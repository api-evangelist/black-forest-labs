created: '2026-05-08'
modified: '2026-05-08'
reconciled: partial
tags:
- AI
- Image Generation
- Flux
- Open Weights
- BFL
- Plans
description: >-
  Black Forest Labs uses a credits-based pay-per-generation model. Per-image rates vary by
  Flux model: Flux Schnell is free direct from BFL; Flux Pro and Flux 1.1 Pro list at
  ~$0.04/image direct. FLUX.2 pricing is calculated by the published calculator based on
  model variant (flex/pro/max/klein 4B/klein 9B), output dimensions, and input image count.
notes: Reconciled per third-party reviews; FLUX.2 specific per-call price requires the live calculator. Aggregator pricing on Replicate / fal.ai differs.
sources:
- https://bfl.ai/pricing
- https://docs.bfl.ai/
plans:
- id: black-forest-labs-payg
  name: Pay-as-you-go (Credits)
  type: usage
  description: Account credits drawn down per image generated; rate depends on selected Flux model.
  entries:
  - label: Flux Schnell
    name: flux_schnell
    type: per_unit
    metric: image
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: 0 USD/image (free direct from BFL)
    userMultiplied: false
  - label: Flux Pro
    name: flux_pro
    type: per_unit
    metric: image
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: 0.04 USD/image (BFL direct)
    userMultiplied: false
  - label: Flux 1.1 Pro
    name: flux_11_pro
    type: per_unit
    metric: image
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: 0.04 USD/image (BFL direct)
    userMultiplied: false
  - label: FLUX.2 (flex / pro / max / klein 4B / klein 9B)
    name: flux2_family
    type: per_unit
    metric: image
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: see calculator (varies by model and resolution)
    userMultiplied: false
  elements:
  - name: Async generation with polling_url
  - name: Global, EU, and US regional endpoints
- id: black-forest-labs-enterprise
  name: Enterprise
  type: enterprise
  description: Volume pricing and SLAs for high-throughput customers.
  entries:
  - label: Enterprise Contract
    name: enterprise
    type: flat
    metric: contract
    limit: -1
    timeFrame: annual
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
