description: >-
  FOCUS-aligned FinOps view of Black Forest Labs. BFL bills via prepaid credits drawn down
  per generation. Cost per image varies by Flux model variant, output dimensions, and number
  of input images. Schnell is free direct from BFL; Pro and 1.1 Pro list at ~$0.04/image.
notes: Cost optimization centers on model selection (Schnell free vs Pro paid) and output dimension control.
sources:
- https://bfl.ai/pricing
- https://docs.bfl.ai/
- https://focus.finops.org/focus-specification/v1-3/
