  description: Image generations charged per call against credit balance.
  unit: image
  aggregation: sum
  dimensions:
  - account
  - model
  - region
  - dimensions
- name: credits_purchased
  description: Prepaid credit purchases.
  unit: USD
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track per-call cost via account credit drawdown reports.
- name: Allocation
  description: Tag generations to applications and creative workflows.
- name: Optimization
  description: Use Schnell or smaller variants for drafts, reserve Pro/Max for final assets; smaller dimensions cost less.
- name: Accountability
  description: Assign budget owners per workflow / creative team.
